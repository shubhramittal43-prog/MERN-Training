<!DOCTYPE html>
<html>
<head>
    <title>Facebook - Create New Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="signup-box">

        <h1>facebook</h1>

        <h2>Create a new account</h2>
        <p>It's quick and easy.</p>

        <form action="success.html">

            <div class="name">
                <input type="text" placeholder="First name" required>
                <input type="text" placeholder="Surname" required>
            </div>

            <label>Date of birth</label>

            <div class="dob">
                <select required>
                    <option>Day</option>
                    <option>1</option>
                    <option>2</option>
                    <option>3</option>
                    <option>4</option>
                    <option>5</option>
                    <option>6</option>
                    <option>7</option>
                    <option>8</option>
                    <option>9</option>
                    <option>10</option>
                    <option>11</option>
                    <option>12</option>
                    <option>13</option>
                    <option>14</option>
                    <option>15</option>
                    <option>16</option>
                    <option>17</option>
                    <option>18</option>
                    <option>19</option>
                    <option>20</option>
                    <option>21</option>
                    <option>22</option>
                    <option>23</option>
                    <option>24</option>
                    <option>25</option>
                    <option>26</option>
                    <option>27</option>
                    <option>28</option>
                    <option>29</option>
                    <option>30</option>
                    <option>31</option>
                </select>

                <select required>
                    <option>Month</option>
                    <option>Jan</option>
                    <option>Feb</option>
                    <option>Mar</option>
                    <option>Apr</option>
                    <option>May</option>
                    <option>Jun</option>
                    <option>Jul</option>
                    <option>Aug</option>
                    <option>Sep</option>
                    <option>Oct</option>
                    <option>Nov</option>
                    <option>Dec</option>
                </select>

                <select required>
                    <option>Year</option>
                    <option>2026</option>
                    <option>2025</option>
                    <option>2024</option>
                    <option>2023</option>
                    <option>2022</option>
                    <option>2021</option>
                    <option>2020</option>
                    <option>2019</option>
                    <option>2018</option>
                    <option>2017</option>
                    <option>2016</option>
                    <option>2015</option>
                    <option>2014</option>
                    <option>2013</option>
                    <option>2012</option>
                    <option>2011</option>
                    <option>2010</option>
                    <option>2009</option>
                    <option>2008</option>
                    <option>2007</option>
                    <option>2006</option>
                    <option>2005</option>
                    <option>2004</option>
                    <option>2003</option>
                </select>
            </div>

            <label>Gender</label>

            <div class="gender">
                <div>
                    Female
                    <input type="radio" name="gender">
                </div>

                <div>
                    Male
                    <input type="radio" name="gender">
                </div>

                <div>
                    Custom
                    <input type="radio" name="gender">
                </div>
            </div>

            <input type="text" placeholder="Mobile number or email address" required>

            <input type="password" placeholder="New password" required>

            <button type="submit">Sign Up</button>

        </form>

    </div>

</div>

</body>
</html>
